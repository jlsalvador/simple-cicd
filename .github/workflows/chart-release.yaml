name: Chart release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  chart-release:
    name: Package & publish Helm chart
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push to gh-pages

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0   # chart-releaser needs full history

      - name: Extract version from tag
        id: version
        # Strip the leading "v" to get a semver for the chart version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Bump chart version and appVersion
        run: |
          VERSION=${{ steps.version.outputs.value }}
          sed -i "s/^version:.*/version: ${VERSION}/" charts/simple-cicd/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"v${VERSION}\"/" charts/simple-cicd/Chart.yaml

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint charts/simple-cicd

      - name: Configure Git for chart-releaser
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.6.0
        with:
          charts_dir: charts
          # Skip uploading if the chart version already exists (idempotent).
          skip_existing: true
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
