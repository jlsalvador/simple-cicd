name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    name: Build, publish & release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # chart-releaser needs full history.

      - name: Extract version from tag
        id: version
        run: |
          echo "full=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "semver=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for images
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ vars.DOCKERHUB_USERNAME }}/simple-cicd
            ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
          flavor: |
            latest=auto

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.operator
          platforms: linux/amd64,linux/arm64,linux/ppc64le,linux/s390x
          push: true
          build-args: |
            VERSION=${{ steps.version.outputs.full }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Bump chart version and appVersion
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.semver }}/" charts/operator/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.version.outputs.full }}\"/" charts/operator/Chart.yaml

      - name: Lint chart
        run: helm lint charts/operator

      - name: Generate release assets
        run: make release-assets VERSION=${{ steps.version.outputs.full }}

      - name: Configure Git for chart-releaser
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Publish Helm chart
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: charts
          skip_existing: true
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.full }}" \
            --title "${{ steps.version.outputs.full }}" \
            --generate-notes \
            --verify-tag \
            bin/crds.yaml \
            bin/operator.yaml
