apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "simple-cicd.fullname" . }}
  labels:
    {{- include "simple-cicd.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "simple-cicd.serviceAccountName" . }}
    namespace: {{ include "simple-cicd.namespace" . }}
roleRef:
  kind: ClusterRole
  name: {{ include "simple-cicd.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
