apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "simple-cicd.fullname" . }}
  labels:
    {{- include "simple-cicd.labels" . | nindent 4 }}
rules:
  # Read Workflows and WorkflowWebhooks
  - apiGroups: ["simple-cicd.jlsalvador.online"]
    resources: ["workflows", "workflowwebhooks"]
    verbs: ["get", "list", "watch"]

  # Full control over WorkflowWebhookRequests (create, read, patch finalizers, delete)
  - apiGroups: ["simple-cicd.jlsalvador.online"]
    resources: ["workflowwebhookrequests"]
    verbs: ["get", "list", "watch", "create", "patch", "delete"]

  # Write access to the status subresource (UpdateWWRStatus uses PATCH .../status)
  - apiGroups: ["simple-cicd.jlsalvador.online"]
    resources: ["workflowwebhookrequests/status"]
    verbs: ["patch"]

  # Create request Secrets for job pods (one per cloned job, in the job's namespace).
  # The ownerReference is set at creation time, so no patch is needed.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]

  # Clone and inspect batch Jobs
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete"]
