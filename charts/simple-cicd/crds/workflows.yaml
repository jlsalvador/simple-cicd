apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: workflows.simple-cicd.jlsalvador.online
spec:
  group: simple-cicd.jlsalvador.online
  names:
    kind: Workflow
    listKind: WorkflowList
    plural: workflows
    shortNames:
    - w
    singular: workflow
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: When is true, the execution of this workflow will be skipped.
      jsonPath: .spec.suspend
      name: Suspend
      type: boolean
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Workflow is the Schema for the workflows API
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            description: WorkflowSpec defines the desired state of Workflow
            properties:
              jobsToBeCloned:
                description: Jobs to be cloned
                items:
                  properties:
                    name:
                      type: string
                  required:
                  - name
                  type: object
                type: array
              next:
                description: Optional list of Workflow to execute next
                items:
                  properties:
                    name:
                      description: Workflow name
                      type: string
                    namespace:
                      description: Workflow namespace
                      type: string
                    when:
                      default: Always
                      description: "Describes the conditions for when a Job will be handled."
                      enum:
                      - OnSuccess
                      - OnAnySuccess
                      - OnFailure
                      - OnAnyFailure
                      - Always
                      type: string
                  required:
                  - name
                  type: object
                type: array
              suspend:
                default: false
                description: When is true, the execution of this workflow will be
                  skipped. Defaults to false.
                type: boolean
            required:
            - jobsToBeCloned
            type: object
        type: object
    served: true
    storage: true
    subresources: {}
