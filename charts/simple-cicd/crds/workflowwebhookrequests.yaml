apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: workflowwebhookrequests.simple-cicd.jlsalvador.online
spec:
  conversion:
    strategy: None
  group: simple-cicd.jlsalvador.online
  names:
    kind: WorkflowWebhookRequest
    listKind: WorkflowWebhookRequestList
    plural: workflowwebhookrequests
    shortNames:
    - wwr
    singular: workflowwebhookrequest
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: True when there are not more Jobs to do.
      jsonPath: .status.done
      name: Done
      type: boolean
    - description: How many times CurrentWorkflows have been done.
      jsonPath: .status.steps
      name: Steps
      priority: 1
      type: string
    - description: Total number of successful Jobs.
      jsonPath: .status.successfulJobs
      name: Successful Jobs
      type: string
    - description: Total number of failed Jobs.
      jsonPath: .status.failedJobs
      name: Failed Jobs
      type: string
    - description: Waiting for these Jobs to be done.
      jsonPath: .status.currentJobs
      name: Current Jobs
      priority: 1
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: WorkflowWebhookRequest is the Schema for the workflowwebhookrequests API
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            description: WorkflowWebhookRequestSpec defines the desired state of WorkflowWebhookRequest
            properties:
              requestSecret:
                description: Reference to the Secret that holds the HTTP request
                  data (body, headers, host, method, url) that triggered this
                  WorkflowWebhookRequest. The secret is mounted into every cloned
                  job pod at /var/run/secrets/kubernetes.io/request/.
                properties:
                  name:
                    type: string
                  namespace:
                    type: string
                required:
                - name
                type: object
              workflowWebhook:
                description: Reference to the WorkflowWebhook.
                properties:
                  name:
                    type: string
                  namespace:
                    type: string
                required:
                - name
                type: object
            required:
            - requestSecret
            - workflowWebhook
            type: object
          status:
            description: WorkflowWebhookRequestStatus defines the observed state of a WorkflowWebhookRequest.
            properties:
              conditions:
                items:
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      type: string
                    reason:
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              currentJobs:
                items:
                  properties:
                    name:
                      type: string
                  required:
                  - name
                  type: object
                type: array
              currentWorkflows:
                items:
                  properties:
                    name:
                      type: string
                  required:
                  - name
                  type: object
                type: array
              done:
                type: boolean
                default: false
              failedJobs:
                type: integer
                default: 0
              steps:
                type: integer
              successfulJobs:
                type: integer
                default: 0
            required:
            - steps
            type: object
        type: object
    served: true
    storage: true
    subresources: {}
