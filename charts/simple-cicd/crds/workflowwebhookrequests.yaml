apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: workflowwebhookrequests.simple-cicd.jlsalvador.online
spec:
  conversion:
    strategy: None
  group: simple-cicd.jlsalvador.online
  names:
    kind: WorkflowWebhookRequest
    listKind: WorkflowWebhookRequestList
    plural: workflowwebhookrequests
    shortNames:
    - wwr
    singular: workflowwebhookrequest
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: True when there are not more Jobs to do.
      jsonPath: .status.done
      name: Done
      type: boolean
    - description: How many times CurrentWorkflows have been done.
      jsonPath: .status.steps
      name: Steps
      priority: 1
      type: string
    - description: Total number of successful Jobs.
      jsonPath: .status.successfulJobs
      name: Successful Jobs
      type: string
    - description: Total number of failed Jobs.
      jsonPath: .status.failedJobs
      name: Failed Jobs
      type: string
    - description: Waiting for these Jobs to be done.
      jsonPath: .status.currentJobs
      name: Current Jobs
      priority: 1
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: WorkflowWebhookRequest is the Schema for the workflowwebhookrequests API
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            description: WorkflowWebhookRequestSpec defines the desired state of WorkflowWebhookRequest
            properties:
              request:
                description: >
                  HTTP request data that triggered this WorkflowWebhookRequest.
                  All fields are base64-encoded. A Secret containing this data is
                  created per cloned Job in the Job's own namespace and mounted at
                  /var/run/secrets/kubernetes.io/request/, enabling cross-namespace
                  job execution without cross-namespace Secret references.
                properties:
                  body:
                    description: Base64-encoded request body.
                    type: string
                  headers:
                    description: Base64-encoded JSON map of request headers.
                    type: string
                  host:
                    description: Base64-encoded Host header value.
                    type: string
                  method:
                    description: Base64-encoded HTTP method (GET, POST, …).
                    type: string
                  remoteAddr:
                    description: Base64-encoded remote address of the caller.
                    type: string
                  timestamp:
                    description: >
                      Base64-encoded Unix epoch (seconds since 1970-01-01 00:00:00 UTC)
                      at which the webhook was received. Example decoded value: "1735689600".
                    type: string
                  url:
                    description: Base64-encoded request URL.
                    type: string
                  userAgent:
                    description: Base64-encoded User-Agent header value.
                    type: string
                required:
                - body
                - headers
                - host
                - method
                - remoteAddr
                - timestamp
                - url
                - userAgent
                type: object
              workflowWebhook:
                description: Reference to the WorkflowWebhook.
                properties:
                  name:
                    type: string
                  namespace:
                    type: string
                required:
                - name
                type: object
            required:
            - request
            - workflowWebhook
            type: object
          status:
            description: WorkflowWebhookRequestStatus defines the observed state of a WorkflowWebhookRequest.
            properties:
              conditions:
                items:
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      type: string
                    reason:
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              allJobs:
                description: >
                  Accumulates every job ref ever cloned for this WorkflowWebhookRequest,
                  across all namespaces. Used by the cleanup finalizer to explicitly delete
                  cross-namespace jobs that Kubernetes GC cannot reach (cross-namespace
                  ownerReferences are disallowed by design in Kubernetes).
                items:
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                  required:
                  - name
                  type: object
                type: array
              currentJobs:
                description: Jobs currently being waited on in the active step.
                items:
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                  required:
                  - name
                  type: object
                type: array
              currentWorkflows:
                description: Workflows active in the current step.
                items:
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                  required:
                  - name
                  type: object
                type: array
              done:
                type: boolean
                default: false
              failedJobs:
                type: integer
                default: 0
              steps:
                type: integer
              successfulJobs:
                type: integer
                default: 0
            required:
            - steps
            type: object
        type: object
    served: true
    storage: true
    subresources: {}
