apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: workflowwebhooks.simple-cicd.jlsalvador.online
spec:
  group: simple-cicd.jlsalvador.online
  names:
    kind: WorkflowWebhook
    listKind: WorkflowWebhookList
    plural: workflowwebhooks
    shortNames:
    - ww
    singular: workflowwebhook
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: When true, incoming requests are dropped without creating a WorkflowWebhookRequest.
      jsonPath: .spec.suspend
      name: Suspend
      type: boolean
    - description: How concurrent WorkflowWebhookRequests are handled (Allow, Forbid, Replace).
      jsonPath: .spec.concurrencyPolicy
      name: Concurrency
      type: string
    name: v1alpha2
    schema:
      openAPIV3Schema:
        description: >
          WorkflowWebhook exposes an HTTP endpoint that the simple-cicd operator
          listens on at /{namespace}/{name}. Each incoming request creates a
          WorkflowWebhookRequest and triggers the configured Workflows.
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            description: WorkflowWebhookSpec defines the desired state of a WorkflowWebhook.
            properties:
              concurrencyPolicy:
                description: >
                  Specifies how to handle a new incoming request when one or
                  more WorkflowWebhookRequests for this webhook are still
                  running.
                  Allow   - allow concurrent executions (default).
                  Forbid  - drop the new request; it is immediately marked done.
                  Replace - delete all running WorkflowWebhookRequests and
                            start fresh with the new one.
                type: string
                default: Allow
                enum:
                - Allow
                - Forbid
                - Replace
              suspend:
                description: >
                  When true, any incoming request to this webhook is dropped:
                  a WorkflowWebhookRequest is created but immediately marked
                  done without executing any Workflow. Defaults to false.
                type: boolean
                default: false
              workflows:
                description: >
                  Ordered list of Workflows to execute when a request arrives.
                  All listed Workflows form the first step and run concurrently.
                  At least one entry is required. Each entry may reference a
                  Workflow in a different namespace; when namespace is omitted
                  the WorkflowWebhook's own namespace is used.
                type: array
                minItems: 1
                items:
                  type: object
                  properties:
                    name:
                      description: Name of the Workflow to execute.
                      type: string
                      maxLength: 253
                      pattern: '^[a-z0-9]([a-z0-9\-\.]*[a-z0-9])?$'
                    namespace:
                      description: >
                        Namespace of the Workflow. Defaults to the
                        WorkflowWebhook's own namespace when omitted.
                      type: string
                      maxLength: 63
                      pattern: '^[a-z0-9]([a-z0-9\-]*[a-z0-9])?$'
                  required:
                  - name
                x-kubernetes-list-type: atomic
            required:
            - workflows
            type: object
        type: object
    served: true
    storage: true
    subresources: {}
