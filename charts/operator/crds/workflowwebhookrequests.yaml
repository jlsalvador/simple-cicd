apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: workflowwebhookrequests.simple-cicd.jlsalvador.online
spec:
  group: simple-cicd.jlsalvador.online
  names:
    kind: WorkflowWebhookRequest
    listKind: WorkflowWebhookRequestList
    plural: workflowwebhookrequests
    shortNames:
    - wwr
    singular: workflowwebhookrequest
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: True when all Jobs have finished.
      jsonPath: .status.done
      name: Done
      type: boolean
    - description: Name of the WorkflowWebhook that originated this request.
      jsonPath: .spec.workflowWebhook.name
      name: Webhook
      type: string
    - description: Total number of successful Jobs.
      jsonPath: .status.successfulJobs
      name: Successful Jobs
      type: string
    - description: Total number of failed Jobs.
      jsonPath: .status.failedJobs
      name: Failed Jobs
      type: string
    - description: Age of the WorkflowWebhookRequest.
      jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    - description: Number of workflow steps completed so far.
      jsonPath: .status.steps
      name: Steps
      priority: 1
      type: string
    - description: Jobs currently being waited on in the active step.
      jsonPath: .status.currentJobs
      name: Current Jobs
      priority: 1
      type: string
    name: v1alpha2
    schema:
      openAPIV3Schema:
        description: >
          WorkflowWebhookRequest represents a single execution triggered by an
          incoming HTTP request to a WorkflowWebhook endpoint. The operator
          creates one WorkflowWebhookRequest per incoming request, drives it
          through all configured Workflow steps, and marks it done when all
          Jobs have finished.
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            description: >
              WorkflowWebhookRequestSpec is immutable after creation. It records
              the WorkflowWebhook that was triggered and the full HTTP request
              payload, which is later materialised as a Secret in each Job's
              namespace.
            properties:
              request:
                description: >
                  HTTP request data that triggered this WorkflowWebhookRequest.
                  All fields are base64-encoded. A Secret containing this data
                  is created per cloned Job in the Job's own namespace and
                  mounted at /var/run/secrets/kubernetes.io/request/, enabling
                  cross-namespace job execution without cross-namespace Secret
                  references.
                properties:
                  body:
                    description: Base64-encoded request body.
                    type: string
                  headers:
                    description: Base64-encoded JSON map of request headers.
                    type: string
                  host:
                    description: Base64-encoded Host header value.
                    type: string
                  method:
                    description: Base64-encoded HTTP method (e.g. GET, POST).
                    type: string
                  remoteAddr:
                    description: Base64-encoded remote address of the caller.
                    type: string
                  timestamp:
                    description: >
                      Base64-encoded Unix epoch (seconds since
                      1970-01-01 00:00:00 UTC) at which the webhook was
                      received. Example decoded value: "1735689600".
                    type: string
                  url:
                    description: Base64-encoded request URL.
                    type: string
                required:
                - body
                - headers
                - host
                - method
                - remoteAddr
                - timestamp
                - url
                type: object
              ttlSecondsAfterFinished:
                description: >
                  If set, this WorkflowWebhookRequest will be automatically
                  deleted this many seconds after it completes.
                  0 means delete immediately on completion.
                  Omitting this field disables automatic deletion.
                  Inherited from WorkflowWebhookSpec.ttlSecondsAfterFinished
                  at creation time; not updated if the WorkflowWebhook changes.
                type: integer
                format: int32
                minimum: 0
              workflowWebhook:
                description: >
                  Reference to the WorkflowWebhook that was triggered. The
                  WorkflowWebhook must exist in the same namespace as this
                  WorkflowWebhookRequest.
                properties:
                  name:
                    description: Name of the WorkflowWebhook.
                    type: string
                    maxLength: 253
                    pattern: '^[a-z0-9]([a-z0-9\-\.]*[a-z0-9])?$'
                  namespace:
                    description: >
                      Namespace of the WorkflowWebhook. Defaults to the
                      WorkflowWebhookRequest's namespace when omitted.
                    type: string
                    maxLength: 63
                    pattern: '^[a-z0-9]([a-z0-9\-]*[a-z0-9])?$'
                required:
                - name
                type: object
            required:
            - request
            - workflowWebhook
            type: object
          status:
            description: >
              WorkflowWebhookRequestStatus is written exclusively by the
              operator. It reflects the current execution state: which Jobs
              are active, cumulative success/failure counters, and lifecycle
              timestamps.
            properties:
              conditions:
                description: >
                  Conditions describe the latest observations of the
                  WorkflowWebhookRequest's state. A "Done" condition is
                  appended when execution finishes (successfully or not).
                items:
                  properties:
                    lastTransitionTime:
                      description: Time at which the condition last changed its status.
                      format: date-time
                      type: string
                    message:
                      description: Human-readable details about the condition.
                      type: string
                    reason:
                      description: >
                        Machine-readable reason for the condition (e.g.
                        "Done", "Suspended", "Forbidden", "NoWorkflows").
                      type: string
                    status:
                      description: '"True" when the condition is active.'
                      type: string
                    type:
                      description: Type of condition (e.g. "Done").
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-type: map
                x-kubernetes-list-map-keys: [type]
              allJobs:
                description: >
                  Accumulates every Job ever cloned for this
                  WorkflowWebhookRequest, across all namespaces and all steps.
                  Used by the cleanup finalizer to explicitly delete
                  cross-namespace Jobs that Kubernetes GC cannot reach because
                  cross-namespace ownerReferences are disallowed by design.
                items:
                  properties:
                    name:
                      description: Name of the cloned Job.
                      type: string
                    namespace:
                      description: Namespace of the cloned Job.
                      type: string
                      default: ""
                  required:
                  - name
                  type: object
                type: array
                x-kubernetes-list-type: map
                x-kubernetes-list-map-keys: [namespace, name]
              currentJobs:
                description: >
                  Jobs currently being waited on in the active workflow step.
                  Cleared when the step finishes and replaced by the next
                  step's Jobs (or left empty when done).
                items:
                  properties:
                    name:
                      description: Name of the active Job.
                      type: string
                    namespace:
                      description: Namespace of the active Job.
                      type: string
                      default: ""
                  required:
                  - name
                  type: object
                type: array
                x-kubernetes-list-type: map
                x-kubernetes-list-map-keys: [namespace, name]
              currentWorkflows:
                description: >
                  Workflows active in the current step. Each entry contributed
                  at least one Job to currentJobs.
                items:
                  properties:
                    name:
                      description: Name of the active Workflow.
                      type: string
                    namespace:
                      description: Namespace of the active Workflow.
                      type: string
                      default: ""
                  required:
                  - name
                  type: object
                type: array
                x-kubernetes-list-type: map
                x-kubernetes-list-map-keys: [namespace, name]
              done:
                description: >
                  True when no further Jobs remain to be executed. Once set,
                  this field is never cleared.
                type: boolean
                default: false
              failedJobs:
                description: >
                  Cumulative count of Jobs that finished with a failure
                  condition across all completed steps.
                type: integer
                default: 0
              steps:
                description: >
                  Number of workflow steps completed so far. Incremented each
                  time the operator advances to a new set of Workflows.
                  Zero means the WorkflowWebhookRequest has not been
                  initialised yet.
                type: integer
                default: 0
              successfulJobs:
                description: >
                  Cumulative count of Jobs that finished successfully across
                  all completed steps.
                type: integer
                default: 0
              startTime:
                description: >
                  Time at which the operator began executing the first workflow
                  step (Steps transitioned from 0 to 1). Follows RFC 3339.
                type: string
                format: date-time
              completionTime:
                description: >
                  Time at which the operator marked this WorkflowWebhookRequest
                  as done. Follows RFC 3339. Together with startTime this gives
                  the total execution duration.
                type: string
                format: date-time
            required:
            - steps
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
