## Number of operator replicas.
replicaCount: 1

image:
  repository: ghcr.io/jlsalvador/simple-cicd
  pullPolicy: IfNotPresent
  # Overrides the image tag. Defaults to the chart appVersion.
  tag: ""

## Additional image pull secrets.
imagePullSecrets: []

## Override the chart name used in resource labels/names.
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  ## Name of the ServiceAccount to use.
  ## If empty, the full chart name is used.
  name: ""

## Namespace where the operator is deployed.
## Defaults to the Helm release namespace.
namespaceOverride: ""

service:
  port: 9000
  targetPort: 9000

resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "200m"
    memory: "128Mi"

## Pod-level security context.
podSecurityContext:
  runAsNonRoot: true

## Container-level security context.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65534

livenessProbe:
  httpGet:
    path: /healthz
    port: 9000
  initialDelaySeconds: 5
  periodSeconds: 15

## Extra labels added to all resources.
extraLabels: {}

## Extra annotations added to the Deployment pod template.
podAnnotations: {}

## Node selector for the operator pod.
nodeSelector: {}

## Tolerations for the operator pod.
tolerations: []

## Affinity rules for the operator pod.
affinity: {}
