apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "simple-cicd.fullname" . }}
  labels:
    {{- include "simple-cicd.labels" . | nindent 4 }}
rules:
  # Read Workflows and WorkflowWebhooks.
  - apiGroups: ["simple-cicd.jlsalvador.online"]
    resources: ["workflows", "workflowwebhooks"]
    verbs: ["get", "list", "watch"]

  # Full control over WorkflowWebhookRequests (create, read, patch finalizers, delete).
  - apiGroups: ["simple-cicd.jlsalvador.online"]
    resources: ["workflowwebhookrequests"]
    verbs: ["get", "list", "watch", "create", "patch", "delete"]

  # Write access to the status subresource (UpdateWWRStatus uses PATCH .../status).
  - apiGroups: ["simple-cicd.jlsalvador.online"]
    resources: ["workflowwebhookrequests/status"]
    verbs: ["patch"]

  # Manage request Secrets:
  #   get    - read source secret data before mirroring to cross-namespace jobs.
  #   create - create the request secret (handler) and mirrored copies (reconciler).
  #   delete - remove the request secret during WWR cleanup (finalizer).
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "delete"]

  # Clone and inspect batch Jobs.
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete"]

  # Create and manage Lease objects for leader election.
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update"]
